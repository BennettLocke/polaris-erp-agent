    <script>
      (() => {
        const data = JSON.parse(document.getElementById("taobao-detail-data").textContent);
        const setText = (selector, value) => {
          const node = document.querySelector(selector);
          if (node) node.textContent = value || "";
        };
        const setLines = (selector, lines) => {
          const node = document.querySelector(selector);
          if (!node) return;
          node.textContent = "";
          (Array.isArray(lines) ? lines : [lines || ""]).forEach((line, index) => {
            if (index > 0) node.appendChild(document.createElement("br"));
            node.appendChild(document.createTextNode(line));
          });
        };
        const setParagraphs = (selector, items) => {
          const node = document.querySelector(selector);
          if (!node) return;
          node.textContent = "";
          (items || []).forEach((item) => {
            const paragraph = document.createElement("p");
            paragraph.textContent = item;
            node.appendChild(paragraph);
          });
        };

        setLines("[data-hero-tagline]", data.hero.tagline);
        setLines("[data-hero-title]", data.hero.title);
        setText("[data-product-name]", data.product.name);
        setText("[data-product-spec]", data.product.spec);
        setLines("[data-product-capacity]", data.product.capacity);
        setLines("[data-product-process]", data.product.process);
        setText("[data-product-size]", data.product.size);
        setText("[data-product-colors]", data.product.colors);
        setText("[data-product-accessories]", data.product.accessories);
        setText("[data-dimension-length]", data.dimensions.length);
        setText("[data-dimension-width]", data.dimensions.width);
        setText("[data-dimension-height]", data.dimensions.height);
        setText("[data-dimension-note]", data.dimensions.note);
        setLines("[data-custom-title]", data.customization.title);
        setText("[data-custom-front]", data.customization.front);
        setText("[data-custom-back]", data.customization.back);
        setText("[data-custom-bag]", data.customization.bag);
        setText("[data-custom-design-title]", data.customization.designTitle);
        setText("[data-custom-format-label]", data.customization.formatLabel);
        setLines("[data-custom-format-lines]", data.customization.formatLines);
        setLines("[data-custom-inner]", data.customization.innerBox);
        setLines("[data-instruction-english]", data.instructions.english);
        setLines("[data-instruction-title]", data.instructions.title);
        setText("[data-color-title]", data.instructions.colorTitle);
        setParagraphs("[data-color-items]", data.instructions.colorItems);
        setText("[data-proof-title]", data.instructions.proofTitle);
        setParagraphs("[data-proof-items]", data.instructions.proofItems);
        setLines("[data-showcase-english]", data.showcase.english);
        setLines("[data-showcase-title]", data.showcase.title);
